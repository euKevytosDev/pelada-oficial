# Perfil PostgreSQL — Neon / Render / Docker
# Ative com: SPRING_PROFILES_ACTIVE=postgres
#
# No Neon: Connection details → formato "JDBC" → copie URL, user e password.
# A URL do Neon já traz ?sslmode=require

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pelada_oficial}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:pelada}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
