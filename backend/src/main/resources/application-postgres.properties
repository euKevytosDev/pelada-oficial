# Perfil PostgreSQL — Neon / Render / Docker
# Ative com: SPRING_PROFILES_ACTIVE=postgres
#
# No Neon: Connection details → formato "JDBC" → copie URL, user e password.
# A URL do Neon já traz ?sslmode=require

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pelada_oficial}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:pelada}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Neon free: pool pequeno evita esgotar conexões e gerar 401 falso sob carga (rodada ao vivo)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
