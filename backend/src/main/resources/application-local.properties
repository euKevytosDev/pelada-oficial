# Perfil local: H2 em ARQUIVO (não perde a pelada se fechar o app)
# Arquivo fica em backend/data/pelada.mv.db

spring.datasource.url=jdbc:h2:file:./data/pelada;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt.secret=pelada-oficial-segredo-dev-mude-em-producao-1234567890
app.jwt.expiration-ms=604800000
