# Perfil local: banco H2 em memória (não precisa instalar nada)
# Console H2 (opcional): http://localhost:8080/h2-console
# JDBC URL no console: jdbc:h2:mem:pelada

spring.datasource.url=jdbc:h2:mem:pelada;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
