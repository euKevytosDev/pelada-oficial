spring.application.name=Pelada Oficial
server.port=8080

# Por enquanto usa H2 em arquivo (perfil local) — não perde dados ao reiniciar.
# Quando o PostgreSQL estiver configurado, troque para: postgres
spring.profiles.active=local

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

app.jwt.secret=pelada-oficial-segredo-dev-mude-em-producao-1234567890
app.jwt.expiration-ms=604800000
