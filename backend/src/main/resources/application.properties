spring.application.name=Pelada Oficial
server.port=${PORT:8080}

# local = H2 no PC | postgres = Neon/Render (defina SPRING_PROFILES_ACTIVE=postgres)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Em produção defina APP_JWT_SECRET (mín. 32 caracteres)
app.jwt.secret=${APP_JWT_SECRET:pelada-oficial-segredo-dev-mude-em-producao-1234567890}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:604800000}
